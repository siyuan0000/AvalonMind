<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalon Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }

        .card {
            background-color: #1e293b;
            border-radius: 0.5rem;
            padding: 1.5rem;
            border: 1px solid #334155;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }

        .btn-danger {
            background-color: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background-color: #dc2626;
        }

        .btn-secondary {
            background-color: #475569;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #334155;
        }

        .input-dark {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 0.5rem;
            border-radius: 0.375rem;
            width: 100%;
        }

        .tab-active {
            border-bottom: 2px solid #3b82f6;
            color: #3b82f6;
        }

        .tab-inactive {
            color: #94a3b8;
        }

        .tab-inactive:hover {
            color: #e2e8f0;
        }
    </style>
</head>

<body class="min-h-screen p-6">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                Avalon Arena</h1>
            <div class="space-x-4">
                <a href="/" class="text-gray-400 hover:text-white">Back to Game</a>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <!-- Left Column: Configuration -->
            <div class="lg:col-span-1 space-y-6">

                <!-- Agent Config -->
                <div class="card">
                    <h2 class="text-xl font-semibold mb-4">Agent Configuration</h2>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-400 mb-1">Load Config</label>
                        <select id="configSelect" class="input-dark" onchange="loadConfig()">
                            <option value="">-- Select Saved Config --</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-400 mb-1">Agent Name</label>
                        <input type="text" id="agentName" class="input-dark" placeholder="e.g., Aggressive Merlin">
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-400 mb-1">Base Model</label>
                        <select id="baseModel" class="input-dark">
                            <option value="ollama/deepseek-r1">Ollama: deepseek-r1</option>
                            <option value="deepseek/deepseek-chat">DeepSeek API: deepseek-chat</option>
                            <option value="deepseek/deepseek-reasoner">DeepSeek API: deepseek-reasoner</option>
                        </select>
                    </div>

                    <div class="flex space-x-2">
                        <button onclick="saveConfig()" class="btn btn-primary flex-1">Save Config</button>
                        <button onclick="deleteConfig()" class="btn btn-danger flex-1">Delete</button>
                    </div>
                </div>

                <!-- Arena Setup -->
                <div class="card">
                    <h2 class="text-xl font-semibold mb-4">Arena Setup</h2>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-400 mb-1">Hero Agent</label>
                        <div id="heroAgentDisplay" class="text-blue-400 font-medium mb-2">None Selected</div>
                        <button onclick="setHeroFromCurrent()" class="btn btn-secondary text-sm w-full">Use Current
                            Config as Hero</button>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-400 mb-1">Number of Games</label>
                        <input type="number" id="numGames" class="input-dark" value="10" min="1" max="100">
                    </div>

                    <div id="arenaControls">
                        <button onclick="startArena()" class="btn btn-primary w-full mb-2">Start Arena Batch</button>
                    </div>
                    <div id="arenaStopControls" class="hidden">
                        <button onclick="stopArena()" class="btn btn-danger w-full mb-2">Stop Arena</button>
                    </div>
                </div>

            </div>

            <!-- Middle Column: Prompt Editor -->
            <div class="lg:col-span-1 space-y-6">
                <div class="card h-full flex flex-col">
                    <h2 class="text-xl font-semibold mb-4">Prompt Editor</h2>

                    <div class="flex space-x-2 mb-4 border-b border-gray-700 overflow-x-auto">
                        <button onclick="switchTab('team_proposal')" class="px-3 py-2 text-sm font-medium tab-active"
                            id="tab-team_proposal">Proposal</button>
                        <button onclick="switchTab('discussion')" class="px-3 py-2 text-sm font-medium tab-inactive"
                            id="tab-discussion">Discussion</button>
                        <button onclick="switchTab('vote')" class="px-3 py-2 text-sm font-medium tab-inactive"
                            id="tab-vote">Vote</button>
                        <button onclick="switchTab('mission_action')" class="px-3 py-2 text-sm font-medium tab-inactive"
                            id="tab-mission_action">Mission</button>
                        <button onclick="switchTab('assassination')" class="px-3 py-2 text-sm font-medium tab-inactive"
                            id="tab-assassination">Assassin</button>
                    </div>

                    <div class="flex-1">
                        <textarea id="promptEditor"
                            class="input-dark h-full font-mono text-xs leading-relaxed resize-none"
                            spellcheck="false"></textarea>
                    </div>

                    <div class="mt-2 text-xs text-gray-500">
                        Use {role_info}, {game_state}, {game_history} as placeholders.
                    </div>
                </div>
            </div>

            <!-- Right Column: Results -->
            <div class="lg:col-span-1 space-y-6">
                <div class="card">
                    <h2 class="text-xl font-semibold mb-4">Live Results</h2>

                    <div class="mb-6">
                        <div class="flex justify-between text-sm mb-1">
                            <span class="text-gray-400">Progress</span>
                            <span id="progressText" class="text-white">0/0</span>
                        </div>
                        <div class="w-full bg-gray-700 rounded-full h-2.5">
                            <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-slate-800 p-3 rounded text-center">
                            <div class="text-gray-400 text-xs uppercase">Win Rate</div>
                            <div id="winRate" class="text-2xl font-bold text-green-400">0%</div>
                        </div>
                        <div class="bg-slate-800 p-3 rounded text-center">
                            <div class="text-gray-400 text-xs uppercase">Games Won</div>
                            <div id="gamesWon" class="text-2xl font-bold text-white">0</div>
                        </div>
                    </div>

                    <div class="h-64 mb-4">
                        <canvas id="resultsChart"></canvas>
                    </div>

                    <div class="overflow-y-auto max-h-64">
                        <table class="w-full text-sm text-left text-gray-400">
                            <thead class="text-xs uppercase bg-gray-700 text-gray-200">
                                <tr>
                                    <th class="px-3 py-2">#</th>
                                    <th class="px-3 py-2">Role</th>
                                    <th class="px-3 py-2">Result</th>
                                </tr>
                            </thead>
                            <tbody id="resultsTableBody">
                                <!-- Rows added dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // State
        let currentConfig = {
            id: null,
            name: '',
            base_model: 'ollama/deepseek-r1',
            prompts: {}
        };
        let currentTab = 'team_proposal';
        let heroConfig = null;
        let chart = null;
        let statusInterval = null;

        // Default Prompts (Placeholder - normally fetch from backend or hardcode defaults)
        const defaultPrompts = {
            'team_proposal': "You are playing Avalon. {role_info}\n\n{game_state}\nPlayers: {player_names}\n{timeline_section}\n\nYou are the leader. Select {team_size} players.\n\nYour selection:",
            'discussion': "You are playing Avalon. {role_info}\n\n{game_state}\nLeader {leader_name} proposed: {proposed_team}\n\nDiscussion:\n{history_text}\n\nYour comment:",
            'vote': "You are playing Avalon. {role_info}\n\n{game_state}\nProposed team: {proposed_team}\n\nYour vote (APPROVE/REJECT):",
            'mission_action': "You are playing Avalon. {role_info}\n\n{game_state}\n\nYour action (SUCCESS/FAIL):",
            'assassination': "You are playing Avalon. {role_info}\n\nGood players: {good_players}\n\nIdentify Merlin.\n\nYour target:"
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            loadConfigList();

            // Set initial prompts
            currentConfig.prompts = { ...defaultPrompts };
            document.getElementById('promptEditor').value = currentConfig.prompts[currentTab];

            // Start status polling
            statusInterval = setInterval(checkStatus, 1000);
        });

        // Tabs
        function switchTab(tab) {
            // Save current editor content to config
            currentConfig.prompts[currentTab] = document.getElementById('promptEditor').value;

            // Switch tab UI
            document.getElementById(`tab-${currentTab}`).className = "px-3 py-2 text-sm font-medium tab-inactive";
            document.getElementById(`tab-${tab}`).className = "px-3 py-2 text-sm font-medium tab-active";

            // Update state
            currentTab = tab;

            // Load new content
            document.getElementById('promptEditor').value = currentConfig.prompts[tab] || defaultPrompts[tab] || "";
        }

        // Config Management
        async function loadConfigList() {
            const res = await fetch('/api/arena/configs');
            const data = await res.json();
            const select = document.getElementById('configSelect');
            select.innerHTML = '<option value="">-- Select Saved Config --</option>';
            data.configs.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.name;
                select.appendChild(opt);
            });
        }

        async function loadConfig() {
            const id = document.getElementById('configSelect').value;
            if (!id) return;

            const res = await fetch(`/api/arena/configs/${id}`);
            const config = await res.json();

            currentConfig = config;
            document.getElementById('agentName').value = config.name;
            document.getElementById('baseModel').value = config.base_model;
            document.getElementById('promptEditor').value = config.prompts[currentTab] || "";
        }

        async function saveConfig() {
            // Update current config object from UI
            currentConfig.name = document.getElementById('agentName').value;
            currentConfig.base_model = document.getElementById('baseModel').value;
            currentConfig.prompts[currentTab] = document.getElementById('promptEditor').value;

            if (!currentConfig.name) {
                alert("Please enter an agent name");
                return;
            }

            const res = await fetch('/api/arena/configs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(currentConfig)
            });

            const data = await res.json();
            if (data.id) {
                currentConfig.id = data.id;
                alert("Config saved!");
                loadConfigList();
            } else {
                alert("Error saving config: " + data.error);
            }
        }

        async function deleteConfig() {
            if (!currentConfig.id) return;
            if (!confirm("Are you sure you want to delete this config?")) return;

            await fetch(`/api/arena/configs/${currentConfig.id}`, { method: 'DELETE' });
            currentConfig.id = null;
            document.getElementById('agentName').value = "";
            loadConfigList();
        }

        // Arena Control
        function setHeroFromCurrent() {
            // Update current config from UI first
            currentConfig.name = document.getElementById('agentName').value;
            currentConfig.base_model = document.getElementById('baseModel').value;
            currentConfig.prompts[currentTab] = document.getElementById('promptEditor').value;

            if (!currentConfig.name) {
                alert("Please name your agent first");
                return;
            }

            heroConfig = JSON.parse(JSON.stringify(currentConfig)); // Deep copy
            document.getElementById('heroAgentDisplay').textContent = heroConfig.name;
        }

        async function startArena() {
            if (!heroConfig) {
                alert("Please select a Hero Agent first");
                return;
            }

            const numGames = parseInt(document.getElementById('numGames').value);

            const res = await fetch('/api/arena/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    hero_config: heroConfig,
                    num_games: numGames
                })
            });

            const data = await res.json();
            if (data.error) {
                alert(data.error);
            } else {
                updateUIState(true);
            }
        }

        async function stopArena() {
            await fetch('/api/arena/stop', { method: 'POST' });
        }

        async function checkStatus() {
            const res = await fetch('/api/arena/status');
            const status = await res.json();

            if (status.is_running) {
                updateUIState(true);
                updateProgress(status);
            } else {
                updateUIState(false);
                if (status.status === 'completed' || status.results.length > 0) {
                    updateProgress(status);
                }
            }
        }

        function updateUIState(isRunning) {
            if (isRunning) {
                document.getElementById('arenaControls').classList.add('hidden');
                document.getElementById('arenaStopControls').classList.remove('hidden');
            } else {
                document.getElementById('arenaControls').classList.remove('hidden');
                document.getElementById('arenaStopControls').classList.add('hidden');
            }
        }

        function updateProgress(status) {
            // Progress Bar
            const pct = (status.progress / status.total_games) * 100;
            document.getElementById('progressBar').style.width = `${pct}%`;
            document.getElementById('progressText').textContent = `${status.progress}/${status.total_games}`;

            // Stats
            const wins = status.results.filter(r => r.hero_won).length;
            const total = status.results.length;
            const rate = total > 0 ? ((wins / total) * 100).toFixed(1) : 0;

            document.getElementById('winRate').textContent = `${rate}%`;
            document.getElementById('gamesWon').textContent = wins;

            // Table
            const tbody = document.getElementById('resultsTableBody');
            tbody.innerHTML = '';
            status.results.slice().reverse().forEach((r, i) => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-700 hover:bg-gray-700/50";
                tr.innerHTML = `
                    <td class="px-3 py-2 text-gray-400">${status.results.length - i}</td>
                    <td class="px-3 py-2">
                        <span class="${r.hero_is_evil ? 'text-red-400' : 'text-blue-400'}">${r.hero_role}</span>
                    </td>
                    <td class="px-3 py-2">
                        <span class="${r.hero_won ? 'text-green-400 font-bold' : 'text-gray-500'}">${r.hero_won ? 'WIN' : 'LOSS'}</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // Chart
            updateChart(status.results);
        }

        // Chart.js
        function initChart() {
            const ctx = document.getElementById('resultsChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Win', 'Loss'],
                    datasets: [{
                        data: [0, 0],
                        backgroundColor: ['#4ade80', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#94a3b8' } }
                    }
                }
            });
        }

        function updateChart(results) {
            const wins = results.filter(r => r.hero_won).length;
            const losses = results.length - wins;

            chart.data.datasets[0].data = [wins, losses];
            chart.update();
        }

    </script>
</body>

</html>
